                      - generic [ref=e1447]:
                        - text: Not great in terms of size for bread other than square pre-sliced “plastic” bread (I buy uncut or bake my own) but I can work with that.
                        - text: The real issue for me was how you cancel the toasting. I’ve never had a toaster where you need to turn the dial round to zero to cancel, I’m used to a button to press. This isn’t a deal breaker but it does mean you have to reset it every time you use the cancel function, which is quite a bit when dealing with cheaper toaster as I have never found one good enough to be consistent.
                        - text: One good thing is that the pre burn didn’t produce the level of smell I’ve experienced with other toasters. Burning chemical smells are rarely, if ever, pleasant!
                        - text: All in all, it toasts bread, so it does its job, these are just irritating issues. It will do.
