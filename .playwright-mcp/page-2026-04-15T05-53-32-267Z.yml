                      - generic [ref=e1636]:
                        - generic [ref=e1638]:
                          - text: this is the closest impersonation of a toaster that i have ever seen
                          - text: its the size of a child's toy
                          - text: i didnt think anything would fit into it
                          - text: and i wasnt far wrong.
                          - text: i generally use cheap supermarket bagged bread for toasting which barely fits into this toaster.
                          - text: in fact i'd say that the bread needs to be trimmed down to fit properly.
                          - text: i tried crumpets in it thinking they are small but the width of the toaster openings are narrow enough that crumpets have to be pushed into the slots - that's a first for any toaster i have ever used before.
                          - text: what i suspected would happen did happen,
                          - text: the cycle ended,
                          - text: the crumpets were stuck inside the toaster,
                          - text: so i had to lever them out by pushing the cooking actuator upwards until i could get a hold of them and pull them out by hand.
                          - text: that's not an impressive design pifco, not impressive at all.
                          - text: the 700watt elements worked fine and my impression is that it cooked evenly enough but took just a little longer than toasters i have used before - but because of my overall bad impression i may just have been looking for things to find wrong about it...? i dont have a (decent) toaster to compare it with, which is of course why i purchased a toaster :)
                          - text: "so my impression is: very very UNimpressed at the design and the size."
                          - text: how on earth could pifco mess up such an easy design ? oh i know, its called materials saving. they use less metal and plastic, so over the many units made the cost to the manufacturer per unit is lower.
                          - text: and bingo !!! that's why i bought it. its a cheaper unit to buy and wont get anything like the use a family would give it, and that's why i MAY end up keeping it. its easier to store under the cupboard being smaller so i may be able to store another bag of flour in the same space as a decent toaster would take up !
                          - text: caravanners and campers note it may be ok for you?
                          - text: also i did wonder why the box was taped up so much with "extra" tape.
                          - text: was what i had delivered to me was an open-box unit that had been returned?
                          - text: will i keep it or return it is the question i have to ponder that question today.
                          - text: my final thoughts are if you want a decent sized toaster then dont buy this one,
                          - text: but for occasional use such as the use i will give it, it may be "good enough" if you dont mind
                          - text: trimming down the size of your bread BUT if you are a bread purchaser from bakers, or perhaps even
                          - text: the larger "pudding bread" purchased cheaply from supermarkets (which toasts up very well) it just wont fit well in this toaster and certainly not for crumpets which EVERY other toaster i have used bar this one managed to cope with well
                          - text: "my final conclusion: buy this toaster only after reading the proviso's above. you may end up regretting it"
