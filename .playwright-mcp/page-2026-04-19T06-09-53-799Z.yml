            - heading "About this item" [level=1] [ref=e741]
            - list [ref=e742]:
              - listitem [ref=e743]: "Automatic Electric Bike Pump: GPUTEK electric bike pump with LCD display can monitor the real-time pressure. Set your desired pressure, bicyle pump will automatically start inflating. Once the preset value is reached, it will stop automatically. This bicycle air pump also features memory function, which remembers your last mode and pressure setting. It offers multiple modes ranging from 2 to 150 PSI, making it suitable for road bike, MTB, city bike, gravel bike, e-bike, and motorcycle"
              - listitem [ref=e744]: "Compact and Portable: GPUTEK mini bicycle pump is impressively compact and portable, measuring only 5.74×2×1.6 inches and weighing a mere 0.76 lbs. It comes with a waterproof storage bag that can be easily attached to your bike frame, allowing you to conveniently store the pump, hose, and other accessories. This makes it an ideal companion for on-the-go tire repairs, ensuring that you are fully equipped for your cycling adventures"
              - listitem [ref=e745]: "Rapid Inflation Speed: This bike tire pump boasts exceptional speed when it comes to inflating your tires. It can inflate a 27.5×2.2 inch mountain bike tire from 0 to 38 PSI in approximately 1 min 45 s, and a 700×23C road bike tire from 0 to 100 PSI in about 2 min. Additionally, it takes about 40 s to inflate a 700×23C tire from 80 to 100 PSI or inflate a 27.5×2.2 inch tire from 28 to 38 PSI. (This data is only for full charge and may vary slightly in actual use)"
              - listitem [ref=e746]: "Compatible with All Bike Valves: Our portable bicycle air pump is designed to be compatible with all bike valves. It features a new hose design that combines Presta and Schrader valves into one. You can effortlessly switch between valves by simply rotating the interface, eliminating the need for multiple adapters and providing you with utmost convenience. Additionally, it comes with a Dunlop interface to accommodate all your needs"
              - listitem [ref=e747]: High-quality polymer lithium battery. A single full charge allows you to inflate up to 6 road bike tires or 9 mountain bike tires. Furthermore, this electric bike pump features a robust cooling system that enables continuous operation from full charge to complete discharge without the need for any breaks. It maintains an appropriate temperature, preventing overheating and ensuring efficient performance throughout
