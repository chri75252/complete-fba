                      - generic [ref=e2148]: I've not had an electric bike pump before , didnt know they existed until a workmate told me about them. Funny enough , after I received this pump I got a puncture on the way to work so got to use it very quickly and im impressed. I use slime filled inner tubes , but as such a hand pump often gives resistance because of the slime so pretty useless at the roadside. This electric pump got my tyre up in seconds and was so simple to use with the Schrader adapter. So simple to use , and you can programme the tyre pressure required easily and the pump remembers it every time so guranteed accuracy. Its lightweight and compact , carried in a nice case on the bike frame with velcro , the charge lead and other adapters going in a neat little flap. Really nice design and although I've only had to use it once its still showing 5 lights so the battery lifrle looks great. Very happy I bought this and there's no way I'll return to hand pumps now.
