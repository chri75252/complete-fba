                      - generic [ref=e2268]: I had purchased an electric pump a couple of years ago that did not work well at all with the Schrader valve of my road bike and overheated to the point that you could not hold it. So when I decided to try this pump, I was cautiously skeptical. Much to my surprise it works great! It pumps quickly and does not get hot. I would strongly recommend this to anyone looking for an easier way to pump up tires. If I have any complaint or design encouragement it would be to design the attachment valve to be quick release so no air is lost in the processing of its removal. But this is minor in the overall big picture.
