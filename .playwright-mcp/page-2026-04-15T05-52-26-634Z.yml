                    - generic [ref=e1374]:
                      - text: My Builders pretty much relied on Soudafoam for gap filling, so when the time came I thought I might as well too.
                      - text: The Smart straw/integral delivery gun works well. A little uncomfortable in the hand when getting into fiddly corners, but provides at least the same dexterity as a gun in my opinion.
                      - text: I've used this to block up some under kitchen cupboard gaps where there was some pretty feisty breezes getting through, and meaning breakfast on a cold day was a warm socks mandatory dress code.
                      - text: After throwing a can of this at gaps and holes there is a nice balance. Not perfect in this 1930's house but for a few quid the level of improvement is significant.
                      - text: Gloves are essential, as is a newspaper or similar as the gun has a small amount of post use spill over. Nothing major but if you get this on your floor or clothes, you are in for some fun to remove!
