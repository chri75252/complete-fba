                      - generic [ref=e1659]:
                        - text: Immediately impressed as soon as I opened the box, the whole thing is well made and all the accessories click together with that reassuring sound that says “well made”. It has twice the power of most models/brands in that price range and yet is still a very quiet motor. Most other reviews mention the noise of other models. 3 power settings help prolong battery consumption.
                        - text: Having gone from a corded pet vac to this it’s certainly a lot lighter and makes doing the stairs much easier, also again being cordless it’s so much easier to just do a quick flick round with it a keep on top of the cleaning.
                        - text: Easy to empty and keep the unit itself clean, charging from completely flat to full took around 5 hours, can be charged via the wall mount or just by the socket on the battery so you can still store the vac in the cupboard and charge the battery separately. So far on full charge I’ve done the whole house 3 times, using the power settings wisely.
                        - text: 3 years warranty give you peace of mind.
                        - text: Overall it’s a great product at a great price and I’d recommend it to anyone.
