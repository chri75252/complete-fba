                      - generic [ref=e2067]: "For the price, this is an exceptional vacuum! My home is mostly wooden and tile floors with some area rugs... and one Siberian Husky who sheds. After a few uses, I can say I'm happy: the automatic setting works well, easy to empty, gets far under beds and furniture, bright light to see what you're after, lightweight, decent tools are easy to pop on and off, reasonably quiet, and I do NOT miss stepping on and dealing with a cord. Charge lasts about an hour on mostly smooth flooring, less on carpet but still plenty of time for average cleaning. I don't like vacuuming, but this model brought much-needed relief. I have to clean the roller each time because of my dog's long fur, but it's easy to do (there's even a tool for it) and the roller can be pulled out easily for deeper cleaning, which is genius. Five real stars!"
