                      - generic [ref=e1768]: Fabulous little vacuum! This is my first cordless hoover as getting older I’ve decided that lightweight is the way forward! I am super impressed with the weight and the suction of this little thing, so light to use and it’s handily tucked behind a door with the charging lead for the battery being a great length. The green light is actually really good at showing up what needs hoovered (I have a cat litter so the little white stones can be a pain!) and the auto suction is really handy. The battery is good enough for a two storey 4 bed house, it does get used faster when you max the suction but for most of the floors I don’t need that function. Dust collection is fine, again enough for us and as I’m lifting the hoover more often for specific spots I find I don’t need to do the whole house at once. It’s just so handy being cordless and I love it. The reviews of others helped me make my decision on this really well priced hoover so thank you!
