                          - text: La verdad es que no puedo estar más contento con esta compra. Os cuento mi experiencia con la aspiradora que pedí, que llegó volando al día siguiente de pedirla!
                          - text: Vino en un paquete súper bien protegido, con caja dura protegiendo la caja de la propia aspiradora. Al sacarla, ya se aprecia la calidad de los materiales, es muy solida y las piezas encajan perfectamente unas con otras. Es bastante ligera y el agarre es comodísimo. Para encenderla, tiene un gatillo y en la parte de arriba, un botón táctil para cambiar la potencia.
                          - text: "El kit viene muy completo, pero hay varias cosas que destacan:"
                          - text: El tubo alargador es telescópico, se extiende y se encoge con un solo botón y tiene una escalera de ajuste. Se puede ajustar a tu altura perfectamente.
                          - text: Incluye un soporte de pared que no solo carga la batería, sino que además de poder colgarla para que no ocupe espacio, también tiene sus propios anclajes para dejar TODAS las puntas organizadas justo al lado.
                          - text: La función principal para lo que vamos a usarla es de escoba. Viene un rodillo motorizado y una luz frontal que deja ver hasta el pelo más escondido.
                          - text: En cuanto a la potencia, al principio, con la velocidad mínima, ya se puede barrer el suelo, pero no aspirar el sofá o los restos de comida de la encimera, pero si la pones al máximo tiene una fuerza de succión muy potente que acaba con todo. No tiene nada que envidiarle a un aspirador de cable. Saca hasta las pelusas más profundas de los cojines del sofá sin despeinarse, jaja. Las alfombras del coche (que son un asco para limpiarlas) también quedan perfectas.
                          - text: Otro punto a favor es la batería. Después de la primera carga, usándola a tope para las pruebas, me dio para media hora. Pero ya con un uso normal (modo escoba), aguanta más de una hora sin parar.
                          - text: "En resumen: Si buscas potencia, comodidad y una batería decente, esta aspiradora te encantará."
