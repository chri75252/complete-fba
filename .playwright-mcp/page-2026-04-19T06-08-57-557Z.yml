                      - generic [ref=e1696]: I don't usually write reviews on products, but I have used my new Fieety Ultra10 vacuum cleaner a couple of times now and have to say I am seriously impressed! For a relatively unknown (to me anyway) brand of vacuum cleaner, the suction is amazing. The transition from LVT flooring to carpets and rugs etc is seamless. The ease of cleaning due to the lightness of the vacuum means less effort compared to my old vacuum and it also seems to take less time to clean. The array of attachments is also very handy and it's easy to switch them around. It is quiet, the information on the handle is very good and it's easy to empty and clean the unit itself. For the price point, I would highly recommend based on just a few uses so far.
