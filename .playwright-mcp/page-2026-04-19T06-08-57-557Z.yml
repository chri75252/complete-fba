            - list [ref=e561]:
              - listitem [ref=e562]: 🌀【50KPa Powerful Suction & Smart Touchscreen】Equipped with a 600W motor delivering 50KPa of powerful suction, this cordless stick vacuum removes up to 99% of embedded pet hair from sofas, stairs, car interiors and more – twice as fast as standard models. The built-in touchscreen lets you choose from 4 suction modes, while also displaying runtime, filter maintenance, and blockage alerts for a truly intelligent clean.
              - listitem [ref=e563]: 🔋【65-Min Runtime & Fast 4-Hour Charging】Powered by 8×2500mAh high-capacity batteries, this upright vacuum extends cleaning time by 35% compared to traditional stick vacuums. Enjoy up to 65 minutes on ECO mode (40 mins standard / 20 mins boost). The included wall-mounted charging dock fully charges the battery in just 4 hours. For even longer cleaning, an optional spare battery doubles runtime to 130 minutes.
              - listitem [ref=e564]: 🥇【1-M Extension Hose – No Corner Left Untouched】The 1-meter flexible hose makes this cordless vacuum truly versatile. Easily reach high ceilings, narrow stairwells, car interiors, and RV crevices – areas a standard stick vacuum can’t access. Perfect for a whole-home deep clean.
              - listitem [ref=e565]: "🐶【2-in-1 Pet Brush: Groom & Clean in One】Tired of stubborn pet hair everywhere? Our specialised detangling pet brush removes embedded hair and dander from sofas, pet beds, and carpets. Regular use not only prevents matting and reduces shedding but also stimulates healthy coat growth. Enjoy a cleaner home and a happier, well-groomed pet."
              - listitem [ref=e566]: 🔄【Aromatherapy Filtration + Auto Mode Anti-Tangle】This lightweight vacuum features an 8-stage filtration system (cyclonic, sponge, HEPA, metal filter, air duct, outlet, guide vanes, fragrance sheet) that traps dust, pollen, and bacteria. The fragrance release leaves a fresh scent while you clean. Plus, the auto mode intelligently detects carpets vs. hard floors and adjusts suction accordingly, while the motorised floor head with LED lights minimises hair tangles and pivots 270° to reach every corner.
              - listitem [ref=e567]: ⚡【Auto Mode & Anti-Tangle】The Ultra 10 cordless stick vacuum cleaner features a new motorized floor head designed to minimize hair entanglement. It features four bright LED lights and 270° rotation, making it easy to clean every corner of your home! Auto mode intelligently detects carpeted and hard floor areas and adjusts suction power accordingly, is a good carpet vacuum cleaner!
              - listitem [ref=e568]: 📞【UK-Based After-Sales Support】Experience any issue with your cordless vacuum? Our dedicated UK-based team is just a message away. Whether you need replacement parts or troubleshooting help, we’re committed to delivering top-quality products and outstanding customer service – simply contact us anytime.
