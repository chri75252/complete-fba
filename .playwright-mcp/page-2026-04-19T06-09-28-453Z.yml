                      - generic [ref=e2141]:
                        - text: Fabulous gift for a Star Wars fan! Good weight to the base, making it stable. The ‘balanced-arm’ mechanism is more for show than a traditional balanced-arm as there’s really no weight to the lamp itself, but perfectly functional with locking screws for stability. The detail on the Millennium Falcon is actually pretty good for what it is. The LED lamp makes for a great visual display and adds to the Falcon’s appeal but don’t expect too much from it if you’re planning on using it to light up your paperwork late at night! It has a cold, bright light with limited spread. Which is ok for homing in on detail, if you’re using it in addition to the main room light.
                        - text: Not particularly well packaged! One of the tiny fins at the front of the Falcon had been bent in, luckily I was able to tease this out without it snapping off. I would like to have seen a bit more protection around the Falcon itself. Hence only four stars.
                        - text: "Concerning storage/delivery: The box arrived damaged, which is a shame, as it was intended as a gift, but we all know that good packaging and care for the products are fast becoming a thing of the past!!"
