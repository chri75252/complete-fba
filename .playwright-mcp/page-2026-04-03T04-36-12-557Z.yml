        - generic [ref=e358]:
          - heading "Fresh Run — Identify Profitable & Sellable Products" [level=3] [ref=e360]
          - generic [ref=e361]:
            - paragraph [ref=e362]: Phase 1 — Quick Overview (Dashboard Tab)
            - list [ref=e363]:
              - listitem [ref=e364]: Select supplier in sidebar → select Main Workflow lineage
              - listitem [ref=e365]: Select the latest CSV in the Financial Report dropdown
              - listitem [ref=e366]: "Check top metric cards: Profitable (EAN-matched, NetProfit > 0), With Sales (subset with bought_in_past_month > 0), Avg ROI, Avg Profit"
              - listitem [ref=e367]:
                - text: "Scan charts:"
                - list [ref=e368]:
                  - listitem [ref=e369]: ROI Distribution — look for concentration points
                  - listitem [ref=e370]: Profitable Categories — highest total profit bars (count in label)
                  - listitem [ref=e371]: Net Profit vs Selling Price — green dots (ROI ≥ 30%) are best candidates
                  - listitem [ref=e372]: Profit vs Competition — green dots with low total_offer_count = best opportunity
            - paragraph [ref=e373]: Phase 2 — Detailed Analysis (Analysis Tab)
            - list [ref=e374]:
              - listitem [ref=e375]: Set tier filter to T1 → sort by NetProfit desc → review VERIFIED matches
              - listitem [ref=e376]: Switch to T2 — review LIKELY matches that need manual check
              - listitem [ref=e377]: Apply min_sales ≥ 50 filter to focus on proven demand
            - paragraph [ref=e378]: Phase 3 — Deep Validation (Operator Tab)
            - list [ref=e379]:
              - listitem [ref=e380]: Select the same CSV → click Run AI Analysis
              - listitem [ref=e381]: "LLM catches: pack size mismatches, variant traps, title mismatches"
              - listitem [ref=e382]:
                - text: Review report in
                - code [ref=e383]: "OUTPUTS/CONTROL_PLANE/FINANCIAL_REPORTS/run_{timestamp}/"
            - paragraph [ref=e384]: Phase 4 — Build Final Product List
            - list [ref=e385]:
              - listitem [ref=e386]: Analysis tab → filter T1+T2, NetProfit > 0, Sales > 0 → Export CSV
              - listitem [ref=e387]: Cross-reference against operator agent's AUDITED OUT list — remove flagged false positives
              - listitem [ref=e388]: Remaining list = actionable sourcing list
            - paragraph [ref=e389]: Phase 5 — Spot-Check Top Items
            - list [ref=e390]:
              - listitem [ref=e391]: Open Amazon listing for top 10-20 products by profit
              - listitem [ref=e392]: Verify product matches visually, check current price vs report
              - listitem [ref=e393]: Confirm Buy Box availability, review count and rating
