                    - generic [ref=e1262]:
                      - text: Arrived on time and was well packaged with loads of bubble wrap. The plastic nozzle and trigger are quite loose and flimsy, so bear this in mind when spraying. Sadly, the mist option did not work, which l wanted for gently spraying orchids. However, the glass bottle is perfectly adequate. I requested a replacement nozzle and a complete replacement (including glass bottle) was immediately despatched. Can't complain about the customer service, which is very good indeed, but the plastic components are not great quality and l don't think will last for too long.
                      - text: "UPDATE 31/1/23: Replacement spray bottle was received the following day, equally well packaged. The spray option works ok-ish. It's not a fine spray, more of a jet with droplets rather than a mist but, for the price, l would recommend."
